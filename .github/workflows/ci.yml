name: WordSage CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

# Cancel any in-progress CI runs for the same PR if new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Aggressively cache Next.js .next/cache to speed up builds
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript Compile Check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build Next.js
        working-directory: ./frontend
        # This acts as both the build step and an implicit strict check of the codebase.
        # Ensure ESLint is run inside the next build or run `npm run lint` separately if needed.
        run: npm run build

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: TypeScript Compile Check
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Build Backend
        working-directory: ./backend
        run: npm run build

  webhook-alert:
    name: Send Webhook Alert
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    # Runs even if the previous jobs fail so we get failure alerts
    if: always() 
    steps:
      - name: Fire Webhook
        run: |
          # The secrets.WEBHOOK_URL must be set in your GitHub Repository Secrets.
          curl -X POST -H "Content-Type: application/json" \
            -d '{
              "repository": "${{ github.repository }}",
              "run_id": "${{ github.run_id }}",
              "frontend_status": "${{ needs.frontend-ci.result }}",
              "backend_status": "${{ needs.backend-ci.result }}",
              "triggering_actor": "${{ github.triggering_actor }}",
              "ref": "${{ github.ref }}"
            }' \
            ${{ secrets.WEBHOOK_URL || 'https://placeholder.webhook.url/endpoint' }}
